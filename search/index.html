<head>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* 状态框样式 */
        .status-box {
            margin: 6em auto 2em;
            /* 增加上边距避免与导航栏重叠 */
            max-width: 800px;
            background: #f8f8f8;
            border-radius: 8px;
            box-shadow: 0 2px 8px #0001;
            padding: 2em;
        }

        .status-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 1em;
        }

        .status-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1em;
        }

        .status-table th,
        .status-table td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        .status-table th {
            background: #e6f7ff;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }

        /* 横幅区域 */
        #banner {
            background: linear-gradient(135deg, #f8a5c2 0%, #a56de2 100%);
            background-size: cover;
            background-position: center;
            width: 100%;
            height: 100vh;
            min-height: 700px;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .banner-content {
            position: relative;
            z-index: 2;
            padding: 0 10%;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .join-item {
            margin-bottom: 50px;
            color: white;
        }

        .join-item h2 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .join-item p {
            font-size: 1.5rem;
            max-width: 700px;
            line-height: 1.6;
        }

        .join-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .join-buttons a {
            display: inline-block;
            padding: 15px 30px;
            border: 3px solid white;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.4s ease;
            text-align: center;
            min-width: 200px;
        }

        .join-buttons a:hover {
            color: #f8a5c2;
            background: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        /* 内容区域 */
        #content {
            background: white;
            padding: 80px 0;
            position: relative;
        }

        .content-box {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .content-box h2 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 15px;
        }

        .content-box h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100px;
            height: 4px;
            background: #f8a5c2;
            border-radius: 2px;
        }

        hr.divider {
            margin: 40px 0;
            height: 2px;
            background: #EBEBEB;
            border: none;
        }

        .content-section {
            margin-bottom: 60px;
        }

        .content-text h3 {
            font-size: 1.8rem;
            color: #333;
            margin: 25px 0 15px;
            line-height: 1.4;
        }

        .content-text p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .content-text a {
            color: #337AB7;
            transition: all 0.3s;
            font-weight: bold;
        }

        .content-text a:hover {
            color: #f8a5c2;
            text-decoration: underline;
        }

        .content-image {
            float: right;
            margin: 20px 0 20px 40px;
            width: 45%;
            max-width: 500px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 8px 8px 20px rgba(234, 234, 234, 0.8);
        }

        .content-image img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .content-image img:hover {
            transform: scale(1.05);
        }

        .add-server-btn {
            display: inline-block;
            background: #f8a5c2;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 5px 15px rgba(248, 165, 194, 0.4);
        }

        .add-server-btn:hover {
            background: #f78fb3;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(248, 165, 194, 0.6);
        }

        /* 弹窗 */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background-color: #fff;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.3);
            animation: popupFadeIn 0.4s;
        }

        @keyframes popupFadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .popup-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            padding-bottom: 10px;
            border-bottom: 2px solid #f8a5c2;
        }

        .popup-message {
            margin-bottom: 25px;
            line-height: 1.7;
            color: #555;
            font-size: 16px;
        }

        .popup-message p {
            margin-bottom: 15px;
        }

        .popup-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .popup-checkbox {
            display: flex;
            align-items: center;
            font-size: 14px;
        }

        .popup-btn {
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: all 0.3s;
        }

        .popup-confirm {
            background-color: #f8a5c2;
            color: white;
        }

        .popup-confirm:hover {
            background-color: #f78fb3;
        }
    </style>
</head>

    <script>
        // 创建图表函数
        function createHistoryChart() {
            const table = document.getElementById('history-table');
            const tbody = table.querySelector('tbody');
            const rows = tbody.querySelectorAll('tr');

            if (rows.length === 0) {
                console.log('没有找到历史数据');
                return;
            }

            // 提取数据
            const labels = [];
            const data = [];
            const statuses = [];

            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 3) {
                    labels.push(cells[0].textContent);
                    data.push(parseInt(cells[1].textContent) || 0);
                    statuses.push(cells[2].textContent);
                }
            });

            // 反转数据，使时间轴从左到右递增
            labels.reverse();
            data.reverse();
            statuses.reverse();

            // 获取Canvas上下文
            const ctx = document.getElementById('history-chart').getContext('2d');

            // 创建图表
            const chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '在线人数',
                        data: data,
                        backgroundColor: 'rgba(248, 165, 194, 0.2)',
                        borderColor: 'rgba(248, 165, 194, 1)',
                        borderWidth: 2,
                        pointBackgroundColor: function (context) {
                            const index = context.dataIndex;
                            return statuses[index] === '在线' ? 'rgba(76, 175, 80, 0.8)' : 'rgba(244, 67, 54, 0.8)';
                        },
                        pointBorderColor: 'rgba(248, 165, 194, 1)',
                        pointBorderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '在线人数'
                            },
                            ticks: {
                                stepSize: 1
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: '时间'
                            }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    const index = context.dataIndex;
                                    return `在线人数: ${context.parsed.y} (${statuses[index]})`;
                                }
                            }
                        },
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        // 监听表格变化并创建图表
        function observeTableChanges() {
            const targetNode = document.getElementById('history-table');
            const observer = new MutationObserver(function (mutations) {
                mutations.forEach(function (mutation) {
                    if (mutation.type === 'childList' && mutation.addedNodes.length > 0) {
                        createHistoryChart();
                    }
                });
            });

            const config = { childList: true, subtree: true };
            observer.observe(targetNode, config);

            // 如果表格已经有数据，直接创建图表
            if (targetNode.querySelector('tbody').children.length > 0) {
                createHistoryChart();
            }
        }

        // 页面加载完成后开始监听表格变化
        window.addEventListener('load', function () {
            setTimeout(observeTableChanges, 1000);
        });
    </script>
