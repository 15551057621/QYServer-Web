<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta name=“robots”content=“noindex”>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QYServer | 图片详情</title>
    <link rel="icon" href="https://qycloudreve.s.odn.cc/f/XDZfr/novaskin-wallpaper-insummer%20%281%29.jpg"
        type="image/x-icon">
    <link rel="stylesheet" href="/lib/all.css">
    <script src="/lib/AllComponents.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: url('https://qycloudreve.s.odn.cc/f/preiX/2025-07-04_23.41.4v8.webp') no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* 隐藏页面右侧默认滚动条（保留滚动功能） */
        html,
        body {
            -ms-overflow-style: none;
            /* IE 10+ */
            scrollbar-width: none;
            /* Firefox */
        }

        html::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        .back-button {
            position: fixed;
            top: 70px;
            left: 20px;
            z-index: 1000;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .image-container {
            position: relative;
            margin-bottom: 30px;
        }

        .main-image {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .image-info {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .image-title {
            font-size: 24px;
            margin-bottom: 15px;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .image-description {
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .image-metadata {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .metadata-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
        }

        .metadata-label {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .metadata-value {
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 15px;
            }

            .image-title {
                font-size: 20px;
            }
        }

        /* 放大模态样式 */
        .zoom-modal {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 2000;
        }

        .zoom-modal.open {
            opacity: 1;
            pointer-events: auto;
        }

        .zoom-modal img {
            max-width: 92%;
            max-height: 92%;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            cursor: zoom-out;
            transition: transform 0.25s ease;
        }

        .main-image {
            cursor: zoom-in;
        }
    </style>
</head>

<body>
    
    <a href="javascript:history.back()" class="back-button">返回</a>

    <div class="container">
        <div class="image-container">
            <img class="main-image" id="displayImage" src="" alt="详细图片">
        </div>

        <div class="image-info">
            <h1 class="image-title" id="imageTitle"></h1>
            <div class="image-description" id="imageDescription"></div>

            <div class="image-metadata">
                <div class="metadata-item">
                    <div class="metadata-label">拍摄时间</div>
                    <div class="metadata-value" id="imageDate"></div>
                </div>
                <div class="metadata-item">
                    <div class="metadata-label">坐标位置</div>
                    <div class="metadata-value" id="imageLocation"></div>
                </div>
                <div class="metadata-item">
                    <div class="metadata-label">拍摄者</div>
                    <div class="metadata-value" id="imageAuthor"></div>
                </div>
                <div class="metadata-item">
                    <div class="metadata-label">建造者</div>
                    <div class="metadata-value" id="imageUthor"></div>
                </div>
            </div>
        </div>

        <!-- 评论区: Twikoo 容器 -->
        <div class="image-comments" id="imageComments" style="margin-top:20px;">
            <h2 style="color:white;margin-bottom:10px;">评论</h2>
            <div id="tcomment" class="comments-section"></div>
        </div>
    </div>

    <!-- 放大模态 -->
    <div id="zoomModal" class="zoom-modal" aria-hidden="true">
        <img id="zoomImg" src="" alt="">
    </div>

    <script src="/lib/all.js"></script>
    <script>
    // 获取URL参数
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    // 评论提交标记（发布后自动刷新用）
    (function () {
        function markPosted() {
            try { sessionStorage.setItem('twikoo.justPosted', String(Date.now())); } catch (e) { }
        }
        document.addEventListener('click', function (e) {
            var t = e.target;
            while (t && t !== document) {
                try {
                    if (t.closest && t.closest('#tcomment')) {
                        var text = (t.innerText || '').toLowerCase();
                        var cls = (t.className || '').toLowerCase();
                        if (/发布|提交|回复|发表评论|发送|发布评论|send|submit|post|publish/.test(text) || /btn|submit|send|publish|post|twikoo/.test(cls)) {
                            markPosted();
                            break;
                        }
                    }
                } catch (err) { }
                t = t.parentElement;
            }
        }, true);
        document.addEventListener('submit', function (e) {
            try {
                var f = e.target;
                if (f && f.closest && f.closest('#tcomment')) markPosted();
            } catch (err) { }
        }, true);
    })();

    // 填充页面内容 + 放大功能
    window.addEventListener('DOMContentLoaded', function () {
        const imageUrl = getQueryParam('img');
        const title = getQueryParam('title') || '未知标题';
        const description = getQueryParam('desc') || '暂无描述';
        const date = getQueryParam('date') || '未知';
        const location = getQueryParam('loc') || '不愿透露';
        const author = getQueryParam('author') || '匿名';
        const uthor = getQueryParam('uthor') || '未知';

        document.getElementById('displayImage').src = decodeURIComponent(imageUrl);
        document.getElementById('imageTitle').textContent = decodeURIComponent(title);
        document.getElementById('imageDescription').textContent = decodeURIComponent(description);
        document.getElementById('imageDate').textContent = decodeURIComponent(date);
        document.getElementById('imageLocation').textContent = decodeURIComponent(location);
        document.getElementById('imageAuthor').textContent = decodeURIComponent(author);
        document.getElementById('imageUthor').textContent = decodeURIComponent(uthor);

        // 图片放大
        const displayImg = document.getElementById('displayImage');
        const zoomModal = document.getElementById('zoomModal');
        const zoomImg = document.getElementById('zoomImg');
        if (displayImg) {
            displayImg.addEventListener('click', function () {
                if (!displayImg.src) return;
                zoomImg.src = displayImg.src;
                zoomModal.classList.add('open');
                zoomModal.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
            });
        }
        zoomModal.addEventListener('click', function () {
            zoomModal.classList.remove('open');
            zoomModal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
            zoomImg.src = '';
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && zoomModal.classList.contains('open')) {
                zoomModal.classList.remove('open');
                zoomModal.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';
                zoomImg.src = '';
            }
        });
    });

    // ========== Twikoo 评论隔离修复（核心） ==========
    (function initTwikooOnce() {
        // 防止重复初始化
        if (window.__twikoo_initialized) return;
        window.__twikoo_initialized = true;

        // 等待 Twikoo 库就绪
        function waitForTwikoo(cb) {
            if (typeof twikoo !== 'undefined') return cb();
            var check = setInterval(function () {
                if (typeof twikoo !== 'undefined') {
                    clearInterval(check);
                    cb();
                }
            }, 100);
        }

        function startTwikoo() {
            // ★ 关键修改：以 img 参数值作为唯一标识（编码后），确保完全隔离
            const imgParam = getQueryParam('img');
            if (!imgParam) {
                console.warn('未找到 img 参数，使用当前路径作为 fallback');
                var fallbackPath = window.location.pathname + window.location.search;
            }
            // 构造唯一 path：前缀 + 完全编码的图片 URL（避免特殊字符干扰）
            const uniquePath = '/gallery/detail/' + encodeURIComponent(imgParam || fallbackPath);

            twikoo.init({
                envId: 'https://plapi.qyserver.cc/',
                el: '#tcomment',
                lang: 'zh-CN',
                path: uniquePath,
                placeholder: '来分享你对这张图片的看法吧！支持Markdown语法~ \n 页面BUG请点击评论区刷新来查看评论',
                meta: [
                    { name: '昵称', placeholder: '怎么称呼你？（必填）', required: true },
                    { name: '邮箱', placeholder: '方便联系你（选填）', required: false },
                    { name: '网站', placeholder: '你的个人主页（选填）', required: false }
                ],
                onCommentLoaded: function () {
                    console.log('Twikoo 加载完成，path=' + uniquePath);
                }
            }).then(function () {
                console.log('Twikoo 初始化成功');
                // 发布后自动刷新（原有逻辑）
                try {
                    var justPosted = sessionStorage.getItem('twikoo.justPosted');
                    if (justPosted && (Date.now() - parseInt(justPosted, 10) < 2 * 60 * 1000)) {
                        var attempts = 0;
                        var timer = setInterval(function () {
                            attempts++;
                            var container = document.getElementById('tcomment');
                            if (!container) { clearInterval(timer); return; }
                            var nodes = container.querySelectorAll('button, a, span, div');
                            var clicked = false;
                            for (var i = 0; i < nodes.length; i++) {
                                var n = nodes[i];
                                var txt = (n.innerText || '').trim();
                                if (/刷新|重新加载|加载更多|刷新评论|reload|refresh/i.test(txt)) {
                                    try { n.click(); } catch (e) { }
                                    clicked = true;
                                    break;
                                }
                            }
                            if (clicked || attempts > 12) {
                                clearInterval(timer);
                                sessionStorage.removeItem('twikoo.justPosted');
                            }
                        }, 800);
                    }
                } catch (e) { }
            }).catch(function (err) {
                console.error('Twikoo 初始化失败:', err);
                var el = document.getElementById('tcomment');
                if (el) el.innerHTML = '<p style="color: #f8a5c2; text-align: center;">评论加载失败，请检查后端服务。</p>';
            });
        }

        waitForTwikoo(startTwikoo);
    })();
    </script>
</body>

</html>
