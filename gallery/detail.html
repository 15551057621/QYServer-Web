<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta name=“robots”content=“noindex”>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QYServer | 图片详情</title>
    <link rel="icon" href="https://qycloudreve.s.odn.cc/f/XDZfr/novaskin-wallpaper-insummer%20%281%29.jpg"
        type="image/x-icon">
    <link rel="stylesheet" href="/lib/all.css">
    <script src="/lib/AllComponents.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: url('https://qycloudreve.s.odn.cc/f/preiX/2025-07-04_23.41.4v8.webp') no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* 隐藏页面右侧默认滚动条（保留滚动功能） */
        html,
        body {
            -ms-overflow-style: none;
            /* IE 10+ */
            scrollbar-width: none;
            /* Firefox */
        }

        html::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        .back-button {
            position: fixed;
            top: 70px;
            left: 20px;
            z-index: 1000;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .image-container {
            position: relative;
            margin-bottom: 30px;
        }

        .main-image {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .image-info {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .image-title {
            font-size: 24px;
            margin-bottom: 15px;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .image-description {
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .image-metadata {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .metadata-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
        }

        .metadata-label {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .metadata-value {
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 15px;
            }

            .image-title {
                font-size: 20px;
            }
        }

        /* 放大模态样式 */
        .zoom-modal {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 2000;
        }

        .zoom-modal.open {
            opacity: 1;
            pointer-events: auto;
        }

        .zoom-modal img {
            max-width: 92%;
            max-height: 92%;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            cursor: zoom-out;
            transition: transform 0.25s ease;
        }

        .main-image {
            cursor: zoom-in;
        }
    </style>
</head>

<body>
    
    <a href="javascript:history.back()" class="back-button">返回</a>

    <div class="container">
        <div class="image-container">
            <img class="main-image" id="displayImage" src="" alt="详细图片">
        </div>

        <div class="image-info">
            <h1 class="image-title" id="imageTitle"></h1>
            <div class="image-description" id="imageDescription"></div>

            <div class="image-metadata">
                <div class="metadata-item">
                    <div class="metadata-label">拍摄时间</div>
                    <div class="metadata-value" id="imageDate"></div>
                </div>
                <div class="metadata-item">
                    <div class="metadata-label">坐标位置</div>
                    <div class="metadata-value" id="imageLocation"></div>
                </div>
                <div class="metadata-item">
                    <div class="metadata-label">拍摄者</div>
                    <div class="metadata-value" id="imageAuthor"></div>
                </div>
                <div class="metadata-item">
                    <div class="metadata-label">建造者</div>
                    <div class="metadata-value" id="imageUthor"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 放大模态 -->
    <div id="zoomModal" class="zoom-modal" aria-hidden="true">
        <img id="zoomImg" src="" alt="">
    </div>

    <script src="/lib/all.js"></script>
    <script>
        // 获取URL参数
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // 页面加载时填充内容
        window.onload = function () {
            const imageUrl = getQueryParam('img');
            const title = getQueryParam('title') || '未知标题';
            const description = getQueryParam('desc') || '暂无描述';
            const date = getQueryParam('date') || '未知';
            const location = getQueryParam('loc') || '不愿透露';
            const author = getQueryParam('author') || '匿名';
            const uthor = getQueryParam('uthor') || '未知';

            document.getElementById('displayImage').src = decodeURIComponent(imageUrl);
            document.getElementById('imageTitle').textContent = decodeURIComponent(title);
            document.getElementById('imageDescription').textContent = decodeURIComponent(description);
            document.getElementById('imageDate').textContent = decodeURIComponent(date);
            document.getElementById('imageLocation').textContent = decodeURIComponent(location);
            document.getElementById('imageAuthor').textContent = decodeURIComponent(author);
            document.getElementById('imageUthor').textContent = decodeURIComponent(uthor);
            // --- 图片放大功能 ---
            const displayImgEl = document.getElementById('displayImage');
            const zoomModal = document.getElementById('zoomModal');
            const zoomImg = document.getElementById('zoomImg');

            if (displayImgEl) {
                displayImgEl.addEventListener('click', function () {
                    const src = displayImgEl.src;
                    if (!src) return;
                    zoomImg.src = src;
                    zoomModal.classList.add('open');
                    zoomModal.setAttribute('aria-hidden', 'false');
                    document.body.style.overflow = 'hidden';
                });
            }

            // 点击遮罩或图片则关闭
            zoomModal.addEventListener('click', function () {
                zoomModal.classList.remove('open');
                zoomModal.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';
                zoomImg.src = '';
            });

            // 按 Esc 键关闭
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') {
                    if (zoomModal.classList.contains('open')) {
                        zoomModal.classList.remove('open');
                        zoomModal.setAttribute('aria-hidden', 'true');
                        document.body.style.overflow = '';
                        zoomImg.src = '';
                    }
                }
            });
        }
    </script>
</body>

</html>
