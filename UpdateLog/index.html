        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", "Microsoft YaHei", Roboto, Arial, sans-serif;

        html, body {
            width: 100%;
            overflow-x: hidden;
            background-color: #f5f5f5;
            color: #5F5F5F;
            scroll-behavior: smooth;
        }
        /* 隐藏页面右侧默认滚动条（保留滚动功能） */
        html, body {
            -ms-overflow-style: none; /* IE 10+ */
            scrollbar-width: none; /* Firefox */
        }

        html::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }
        
        a {
            text-decoration: none;
            color: inherit;
        }

        /* https://qycloudrevetermux.s.odn.cc/f/d/2BMfE/2025-07-05_14.dfgdfgdg20.03.png */
        /* 内容区域 */
        #content {
            background: url('https://t.alcy.cc/ycy') no-repeat center center fixed;
            background-size: cover;
            padding: 80px 0;
            position: relative;
            min-height: calc(100vh - 60px);
        }
        
        .content-box {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .content-box h2 {
            font-size: 2.2rem;
            color: #333;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 15px;
            text-align: center;
        }
        
        .content-box h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: #f8a5c2;
            border-radius: 2px;
        }
        
        .changelog-container {
            margin-top: 40px;
        }
        
        .changelog-item {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border-left: 4px solid #f8a5c2;
            backdrop-filter: blur(10px);
            text-align: left; /* 确保内容文字不居中 */
        }
        
        .changelog-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.95);
        }
        
        .changelog-date {
            color: #888;
            font-size: 0.95em;
            margin-bottom: 10px;
        }
        
        .changelog-title {
            font-weight: bold;
            font-size: 1.4em;
            margin-bottom: 15px;
            color: #333;
        }
        
        .changelog-content {
            color: #555;
            line-height: 1.7;
            text-align: left; /* 确保内容文字不居中 */
        }
        
        .changelog-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 15px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .changelog-content a {
            color: #337AB7;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .changelog-content a:hover {
            color: #f8a5c2;
            text-decoration: underline;
        }
        
        /* 页脚 */
        #footer {
            background: #333;
            color: #ddd;
            padding: 50px 0 20px;
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        
        .footer-section {
            flex: 1;
            min-width: 300px;
            margin-bottom: 30px;
        }
        
        .footer-section h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #fff;
            position: relative;
            padding-bottom: 10px;
        }
        
        .footer-section h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 3px;
            background: #f8a5c2;
        }
        
        .footer-links a {
            display: block;
            padding: 8px 0;
            transition: all 0.3s;

            border-top: 1px solid #444;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        
        .footer-bottom a {
            color: #f8a5c2;
            transition: all 0.3s;
        }
        
        .footer-bottom a:hover {

        }
    </style>

    <script>
        // Lightbox 功能：保留带链接跳转，未带链接则放大
        (function(){
            function openLightbox(src){
                if(!src) return;
                if(document.querySelector('.lightbox.open')) return;
                const lb = document.createElement('div');
                lb.className = 'lightbox open';
                lb.innerHTML = `
                    <div class="lightbox-close" aria-label="关闭">×</div>
                    <img class="lightbox-img" src="${src}">
                `;
                document.body.appendChild(lb);
                function remove(){
                    if(!lb || !lb.parentNode) return;
                    lb.classList.remove('open');
                    lb.remove();
                    document.removeEventListener('keydown', onKey);
                }
                lb.addEventListener('click', function(e){ if(e.target === lb) remove(); });
                lb.querySelector('.lightbox-close').addEventListener('click', remove);
                function onKey(e){ if(e.key === 'Escape') remove(); }
                document.addEventListener('keydown', onKey);
            }

            function bindImage(img){
                if(!img) return;
                // 排除音乐图标等控件
                if(img.id === 'musicIcon') return;
                const wrappedByLink = img.closest && img.closest('a');
                if (wrappedByLink) return;

                img.style.cursor = 'zoom-in';
                if (img._lightboxBound) return; // 防重复
                img._lightboxBound = true;
                img.addEventListener('click', function(e){
                    e && e.preventDefault && e.preventDefault();
                    openLightbox(this.src);
                });
            }

            // 初始绑定（已有静态图片）
            document.addEventListener('DOMContentLoaded', function(){
                document.querySelectorAll('#content img, .changelog-content img').forEach(bindImage);
            });

            // 监测动态插入（main.js 可能异步加载日志）
            const list = document.getElementById('changelog-list');
            if(list){
                const mo = new MutationObserver(function(muts){
                    muts.forEach(m => {
                        m.addedNodes.forEach(node => {
                            if(node.nodeType !== 1) return;
                            // 新增的日志项内图片
                            node.querySelectorAll && node.querySelectorAll('img').forEach(bindImage);
                            // 若整个列表被替换，重复绑定所有图片作为兜底
                            if(node.id === 'changelog-list' || node.classList && node.classList.contains('changelog-container')){
                                document.querySelectorAll('#content img, .changelog-content img').forEach(bindImage);
                            }
                        });
                    });
                });
                mo.observe(list, { childList: true, subtree: true });
            }
        })();
    </script>
