<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QYServer | 问题解答</title>
    <link rel="icon" href="https://qycloudreve.s.odn.cc/f/XDZfr/novaskin-wallpaper-insummer%20%281%29.jpg"
        type="image/x-icon">
    <link rel="stylesheet" href="/lib/all.css">
    <style>
        /* 固定背景层样式 */
        .bg-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            pointer-events: none;
            background-color: #f5f5f5;
            color: #5F5F5F;
            scroll-behavior: smooth;
        }

        /* 内容区域 - 壁纸将在JS中设置 */
        #content {
            padding: 60px 0;
            position: relative;
        }

        #content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            z-index: 0;
        }

        .content-box {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .content-box h2 {
            font-size: 2.2rem;
            color: #333;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 15px;
            text-align: center;
        }

        .content-box h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: #f8a5c2;
            border-radius: 2px;
        }

        /* 搜索框样式 */
        .search-container {
            margin: 30px 0;
            text-align: center;
        }

        #search {
            width: 100%;
            max-width: 500px;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.9);
        }

        #search:focus {
            outline: none;
            border-color: #f8a5c2;
            box-shadow: 0 4px 15px rgba(248, 165, 194, 0.2);
            background: rgba(255, 255, 255, 1);
        }

        /* 问题列表样式 */
        #problem-list {
            list-style: none;
            padding: 0;
        }

        #problem-list li {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin: 1.5em 0;
            padding: 1.5em;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.07);
            border-left: 4px solid #f8a5c2;
            transition: all 0.3s ease;
        }

        #problem-list li:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 1);
        }

        #problem-list li a {
            text-decoration: none;
            color: #2d8cf0;
            font-weight: bold;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 10px;
        }

        #problem-list li a:hover {
            color: #f8a5c2;
        }

        #problem-list small {
            color: #666;
            display: block;
            margin-bottom: 10px;
        }

        #problem-list mark {
            background: rgba(248, 165, 194, 0.2);
            color: #f8a5c2;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-right: 5px;
        }

        /* 页脚 */
        #footer {
            background: #333;
            color: #ddd;
            padding: 50px 0 20px;
            position: relative;
        }

        #footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('') center/cover fixed;
            opacity: 0.1;
            z-index: 0;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        .footer-section {
            flex: 1;
            min-width: 300px;
            margin-bottom: 30px;
        }

        .footer-section h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #fff;
            position: relative;
            padding-bottom: 10px;
        }

        .footer-section h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 3px;
            background: #f8a5c2;
        }

        .footer-links a {
            display: block;
            padding: 8px 0;
            transition: all 0.3s;
        }

        .footer-links a:hover {
            color: #f8a5c2;
            padding-left: 5px;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid #444;
            margin-top: 20px;
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .footer-bottom a {
            color: #f8a5c2;
            transition: all 0.3s;
        }

        .footer-bottom a:hover {
            text-decoration: underline;
        }

        /* 响应式设计 */
        @media (max-width: 900px) {
            .join-item h2 {
                font-size: 2.5rem;
            }

            .join-item p {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>

    <div class="bg-fixed"></div>
    <!-- 导航栏 -->
    <div id="menu-box">
        <div class="menu">

                    <a href="/rules/"><i class="fas fa-arrow-right"></i> 服务器规则</a>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop>
        <source src="https://qycloudrevetermux.s.odn.cc/f/d/lODc6/Motions.mp3" type="audio/mpeg">
    </audio>

    <!-- 音乐控制按钮 -->
    <div id="musicControl">
        <img id="musicIcon"
            src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmZiI+PHBhdGggZD0iTTMgOXY2aDNsNS41IDVWMTRsLTQuNS00LjVIM1ptMTAtMi41VjNIMTB2MTMuNWwtMi41LTIuNS0yIDIgNSA1IDUtNVY2LjV6Ii8+PC9zdmc+"
            alt="音乐控制">
    </div>

    <script src="/lib/all.js"></script>
    <script>
        // 壁纸配置
        const wallpapers = {
            desktop: 'https://t.alcy.cc/pc', // 电脑壁纸
            mobile: 'https://t.alcy.cc/mp' // 手机壁纸（与电脑一致）
        };

        // 检测设备类型
        function detectDeviceType() {
            const userAgent = navigator.userAgent;
            if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent)) {
                return 'mobile';
            } else {
                return 'desktop';
            }
        }

        // 设置壁纸
        // ...existing code...
        const problems = [
            { id: '001', title: '常见问题', tags: ['玩家'], summary: '常见问题', file: 'problems/001.md' },
            { id: '019', title: '领地管理使用教程', tags: ['玩家'], summary: '详细的使用教程', file: 'problems/019.md' },
            { id: '004', title: '进不去怎么办？', tags: ['玩家'], summary: '检查网络或地区', file: 'problems/004.md' },
            { id: '003', title: '如何使用oiiao猫', tags: ['玩家'], summary: '如何使用：令名牌+铁砧更将名字改为 oiia', file: 'problems/003.md' },
            { id: '002', title: '游戏卡顿如何解决?', tags: ['玩家'], summary: ' 删除a&s并开启"材质包限制', file: 'problems/002.md' },
            { id: '005', title: '如何使用水晶球更改视角?', tags: ['玩家'], summary: '水晶球右键即可', file: 'problems/005.md' },
            { id: '007', title: '视角不正常如何更改', tags: ['玩家'], summary: '查看视频教程', file: 'problems/007.md' },
            { id: '006', title: '如何使用网页地图聊天功能？', tags: ['玩家'], summary: '在游戏注册打开网站登录即可', file: 'problems/006.md' },
            { id: '009', title: '表情使用与注意事项', tags: ['玩家'], summary: '英文双引号', file: 'problems/009.md' },
            { id: '017', title: '购买', tags: ['入门'], summary: '如何购买', file: 'problems/017.md' },
            { id: '114', title: '日志', tags: [''], summary: '日志', file: 'problems/114.md' },
            { id: '010', title: 'Java-BE互通服操作文档', tags: [''], summary: 'Java-BE互通服操作文档', file: 'problems/javabeserver.md' },
            { id: '011', title: 'Java-BE互通服指令', tags: ['互通服'], summary: 'Java-BE互通服指令', file: 'problems/javabecomm.md' }
        ];

        // 渲染问题列表
        function renderList(filter = '') {
            const list = document.getElementById('problem-list');
            list.innerHTML = '';
            const keyword = filter.trim().toLowerCase();

            problems.filter(p =>
                p.title.toLowerCase().includes(keyword) ||
                p.summary.toLowerCase().includes(keyword) ||
                (p.tags && p.tags.join(',').toLowerCase().includes(keyword))
            ).forEach(p => {
                const li = document.createElement('li');
                li.innerHTML = `
          <a href="problem.html?id=${p.id}">${p.title}</a>
          <small>${p.summary}</small>
          <span>${(p.tags || []).map(t => `<mark>${t}</mark>`).join(' ')}</span>
        `;
                list.appendChild(li);
            });
        }

        // 页面加载完成后
        window.addEventListener('load', function () {
            // 设置壁纸
            setWallpaper();

            // 初始化问题列表
            renderList();
        });

        function setWallpaper() {
            const deviceType = detectDeviceType();
            const bgDiv = document.querySelector('.bg-fixed');
            bgDiv.style.backgroundImage = `url('${wallpapers[deviceType]}')`;
        }
    </script>
</body>
