<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问题详情 - QYServer</title>
    <link rel="icon" href="https://qycloudreve.s.odn.cc/f/XDZfr/novaskin-wallpaper-insummer%20%281%29.jpg"
        type="image/x-icon">
    <link rel="stylesheet" href="/lib/all.css">
    <script src="/lib/marked.min.js"></script>
    <style>
        .bg-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: url('https://t.alcy.cc/ycy') center/cover no-repeat;
            pointer-events: none;
        }

        /* 横幅区域 */
        #banner {
            background: linear-gradient(135deg, #f8a5c2 0%, #a56de2 100%);
            background-size: cover;
            background-position: center;
            width: 100%;
            height: 40vh;
            min-height: 300px;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .banner-content {
            position: relative;
            z-index: 2;
            padding: 0 10%;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            text-align: center;
        }

        .banner-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 120%;
            background: url('') center/cover;
            opacity: 0.15;
            z-index: -1;
        }

        .join-item {
            margin-bottom: 30px;
            color: white;
        }

        .join-item h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        /* 内容区域 - 添加壁纸 */
        #content {
            padding: 60px 0;
            position: relative;
            min-height: 60vh;
        }

        #content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            z-index: 0;
        }

        .content-box {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .problem-header {
            margin-bottom: 30px;
            text-align: center;
            position: relative;
        }

        .problem-header h2 {
            font-size: 2.2rem;
            color: #333;
            margin-bottom: 15px;
            position: relative;
            padding-bottom: 15px;
        }

        .problem-header h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: #f8a5c2;
            border-radius: 2px;
        }

        .problem-tags {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .problem-tags mark {
            background: rgba(248, 165, 194, 0.2);
            color: #f8a5c2;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* 返回按钮样式修改 - 靠左对齐 */
        .back-button-container {
            text-align: left;
            margin-bottom: 20px;
        }

        .back-button {
            display: inline-block;
            padding: 0.8em 1.5em;
            border: none;
            border-radius: 4px;
            background: #f8a5c2;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(248, 165, 194, 0.3);
        }

        .back-button:hover {
            background: #f78fb3;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(248, 165, 194, 0.4);
        }

        /* 问题内容样式 */
        #problem-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2.5em;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.07);
            margin: 2em auto;
            max-width: 800px;
        }

        /* Markdown内容样式 */
        #problem-content h1,
        #problem-content h2,
        #problem-content h3 {
            color: #333;
            margin: 1.5em 0 0.8em;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 0.3em;
        }

        #problem-content h1 {
            font-size: 1.8rem;
        }

        #problem-content h2 {
            font-size: 1.6rem;
        }

        #problem-content h3 {
            font-size: 1.4rem;
        }

        #problem-content p {
            line-height: 1.7;
            margin-bottom: 1.2em;
            color: #555;
        }

        #problem-content ul,
        #problem-content ol {
            margin-bottom: 1.2em;
            padding-left: 1.5em;
        }

        #problem-content li {
            margin-bottom: 0.5em;
            line-height: 1.6;
        }

        #problem-content blockquote {
            border-left: 4px solid #f8a5c2;
            padding-left: 1em;
            margin: 1.5em 0;
            color: #666;
            background: rgba(248, 165, 194, 0.05);
            padding: 1em;
            border-radius: 0 8px 8px 0;
        }

        #problem-content code {
            background-color: rgba(248, 165, 194, 0.1);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            color: #f8a5c2;
            font-family: 'Consolas', monospace;
        }

        #problem-content pre {
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 1.2em;
            overflow: auto;
            color: #f8f8f2;
            font-family: 'Consolas', monospace;
            line-height: 1.5;
            margin: 1.5em 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #f8a5c2;
        }

        #problem-content pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        #problem-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5em 0;
        }

        #problem-content table th,
        #problem-content table td {
            border: 1px solid #ddd;
            padding: 0.8em;
        }

        #problem-content table th {
            background: rgba(248, 165, 194, 0.1);
        }

        #problem-content a {
            color: #2d8cf0;
            transition: all 0.3s;
        }

        #problem-content a:hover {
            color: #f8a5c2;
            text-decoration: underline;
        }

        /* 页脚 */
        #footer {
            background: #333;
            color: #ddd;
            padding: 50px 0 20px;
            position: relative;
        }

        #footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('') center/cover fixed;
            opacity: 0.1;
            z-index: 0;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        .footer-section {
            flex: 1;
            min-width: 300px;
            margin-bottom: 30px;
        }

        .footer-section h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #fff;
            position: relative;
            padding-bottom: 10px;
        }

        .footer-section h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 3px;
            background: #f8a5c2;
        }

        .footer-links a {
            display: block;
            padding: 8px 0;
            transition: all 0.3s;
        }

        .footer-links a:hover {
            color: #f8a5c2;
            padding-left: 5px;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid #444;
            margin-top: 20px;
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .footer-bottom a {
            color: #f8a5c2;
            transition: all 0.3s;
        }

        .footer-bottom a:hover {
            text-decoration: underline;
        }

        /* 响应式设计 */
        @media (max-width: 900px) {
            .join-item h2 {
                font-size: 2rem;
            }

            #banner {
                height: 35vh;
                min-height: 250px;
            }
        }

        /* 图片放大模态样式 */
        .img-modal-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            padding: 20px;
            animation: modalFadeIn 0.18s ease;
        }

        .img-modal-content {
            max-width: 95%;
            max-height: 95%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .img-modal-content img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .img-modal-close {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div id="musicControl">
        <img id="musicIcon"
            src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2ZmZiI+PHBhdGggZD0iTTMgOXY2aDNsNS41IDVWMTRsLTQuNS00LjVIM1ptMTAtMi41VjNIMTB2MTMuNWwtMi41LTIuNS0yIDIgNSA1IDUtNVY2LjV6Ii8+PC9zdmc+"
            alt="音乐控制">

    <script src="/lib/all.js"></script>
    <script>
        // 问题列表配置（与index.js保持同步）
        const problems = [
            { id: '001', title: '常见问题', tags: ['玩家'], summary: '常见问题', file: 'problems/001.md' },
            { id: '019', title: '领地管理使用教程', tags: ['玩家'], summary: '详细的使用教程', file: 'problems/019.md' },
            { id: '004', title: '进不去怎么办？', tags: ['玩家'], summary: '检查网络或地区', file: 'problems/004.md' },
            { id: '003', title: '如何使用oiiao猫', tags: ['玩家'], summary: '如何使用：令名牌+铁砧更将名字改为 oiia', file: 'problems/003.md' },
            { id: '002', title: '游戏卡顿如何解决?', tags: ['玩家'], summary: ' 删除a&s并开启"材质包限制', file: 'problems/002.md' },
            { id: '005', title: '如何使用水晶球更改视角?', tags: ['玩家'], summary: '水晶球右键即可', file: 'problems/005.md' },
            { id: '007', title: '视角不正常如何更改', tags: ['玩家'], summary: '查看视频教程', file: 'problems/007.md' },
            { id: '006', title: '如何使用网页地图聊天功能？', tags: ['玩家'], summary: '在游戏注册打开网站登录即可', file: 'problems/006.md' },
            { id: '009', title: '表情使用与注意事项', tags: ['玩家'], summary: '英文双引号', file: 'problems/009.md' },
            { id: '017', title: '购买', tags: ['入门'], summary: '如何购买', file: 'problems/017.md' },
            { id: '114', title: '日志', tags: [''], summary: '日志', file: 'problems/114.md' },
        ];

        // 获取 URL 参数
        function getQuery(name) {
            const m = location.search.match(new RegExp('(?:[?&]' + name + '=)([^&]+)'));
            return m ? decodeURIComponent(m[1]) : '';
        }

        // 加载问题内容
        const id = getQuery('id');
        const problem = problems.find(p => p.id === id);
        const contentElement = document.getElementById('problem-content');
        const titleElement = document.getElementById('problem-title');
        const tagsElement = document.getElementById('problem-tags');

        if (!problem) {
            contentElement.innerHTML = '未找到该问题。';
            titleElement.textContent = '问题不存在';
        } else {
            // 设置标题和标签
            titleElement.textContent = problem.title;
            document.title = problem.title + ' - 问题详情';

            if (problem.tags && problem.tags.length > 0) {
                tagsElement.innerHTML = problem.tags.map(t => `<mark>${t}</mark>`).join(' ');
            }

            // 显示加载状态
            contentElement.setAttribute('data-loading', 'true');

            fetch(problem.file)
                .then(r => {
                    if (!r.ok) throw new Error('文件加载失败: ' + r.status);
                    return r.text();
                })
                .then(md => {
                    contentElement.innerHTML = marked.parse(md);
                    // 为渲染后的图片绑定放大行为（大屏模态 / 小屏新标签）
                    setTimeout(function () {
                        document.querySelectorAll('#problem-content img').forEach(img => {
                            if (!img) return;
                            img.style.cursor = 'pointer';
                            img.addEventListener('click', function () {
                                handleImageClick(this.src);
                            });
                        });
                    }, 50);
                })
                .catch(error => {
                    console.error(error);
                    contentElement.innerHTML = '<p>加载内容时出错：' + error.message + '</p>';
                })
                .finally(() => {
                    // 移除加载状态
                    contentElement.removeAttribute('data-loading');
                });
        }

        // 图片放大（大屏模态 / 小屏新标签）
        function openImageModal(src) {
            if (!src) return;
            if (window.innerWidth < 900) {
                window.open(src, '_blank');
                return;
            }
            const overlay = document.createElement('div');
            overlay.className = 'img-modal-overlay';
            overlay.innerHTML = `<div class="img-modal-content"><button class="img-modal-close" aria-label="关闭">×</button><img src="${src}" alt=""></div>`;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', function (e) {
                if (e.target === overlay || e.target.classList.contains('img-modal-close')) {
                    overlay.remove();
                }
            });
            function onKey(e) { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onKey); } }
            document.addEventListener('keydown', onKey);
        }

        function handleImageClick(src) {
            openImageModal(src);
        }
    </script>
</body>
